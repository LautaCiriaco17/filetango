<!DOCTYPE html>
<html lang="{{ site.locale | slice: 0, 2 | default: 'es' }}">
  <head>
    {% include head.html %}  <!-- sin <head> interno -->
    <link rel="stylesheet" href="{{ '/assets/css/agency.css' | relative_url }}">
    <!-- (opcional) Glightbox CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
  </head>
  <body id="page-top">
    {% include navheader.html %}
    {{ content }}
    {% include footer.html %}

    <script src="{{ '/assets/js/jquery.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/bootstrap.bundle.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/jquery.easing.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/jqBootstrapValidation.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/contact_me.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/agency.js' | relative_url }}"></script>
    <!-- (opcional) Glightbox JS -->
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js" defer></script>
    <script>/* init glightbox si lo usás */</script>
  </body>
</html>
